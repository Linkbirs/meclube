<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MECLUBE</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --rojo:#b30000;
  --rojo-claro:#e53935;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:#fff;
}

header{
  text-align:center;
  padding:30px 20px;
  border-bottom:1px solid #eee;
}

header h1{
  color:var(--rojo);
  font-weight:800;
}

header img{
  width:120px;
  margin-top:10px;
}

.section{
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
}

.buttons{
  display:grid;
  gap:15px;
}

button{
  padding:14px;
  border:none;
  border-radius:10px;
  background:var(--rojo);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  background:var(--rojo-claro);
}

.section-title{
  text-align:center;
  margin:40px 0 20px;
}

.section-title h2{
  color:var(--rojo);
}

iframe{
  width:100%;
  height:300px;
  border:none;
  border-radius:12px;
  margin-top:20px;
}

</style>
</head>

<body>

<header>
  <h1>MECLUBE</h1>
  <img src="Whats-App-Image-2024-12-23-at-4-15-01-AM-6.jpg" alt="logo">
</header>

<div class="section">

  <div class="buttons">
    <button onclick="openLink('https://drive.google.com/file/d/17DZpTEugvq3iVDk-7_i3xDDyt_1H_qwK/preview')">CATÁLOGO</button>
  </div>

  <div id="viewer"></div>

  <div class="section-title">
    <h2>DISTRIBUCIÓN DE GRASA</h2>
  </div>

  <div class="buttons">
    <button onclick="window.open('https://sites.google.com/view/meclubehbmgsxsyj/p%C3%A1gina-principal')">BOMBAS NEUMÁTICAS PARA LUBRICACIÓN</button>
    <button onclick="window.open('https://sites.google.com/view/meclube-gfjxfjzajt/p%C3%A1gina-principal')">BOMBAS NEUMÁTICAS INDUSTRIALES PARA GRASA</button>
    <button onclick="window.open('https://sites.google.com/view/meclube-prensa-levantadora/p%C3%A1gina-principal')">PRENSA-LEVANTADORA BOMBAS DE GRASA</button>
    <button onclick="window.open('https://sites.google.com/view/meclube-set-neumaticos/p%C3%A1gina-principal')">SET NEUMÁTICOS</button>
    <button onclick="window.open('https://sites.google.com/view/meclube-pistolas-bombas-lubri/p%C3%A1gina-principal')">PISTOLAS PARA BOMBAS DE LUBRICACIÓN</button>
    <button onclick="window.open('https://sites.google.com/view/meclube-reguladores-de-presion/p%C3%A1gina-principal')">REGULADORES DE PRESIÓN</button>
    <button onclick="window.open('https://sites.google.com/view/meclube-lubricadores/p%C3%A1gina-principal')">LUBRICADORES</button>
    <button onclick="window.open('https://sites.google.com/view/meclube-accesorios-/p%C3%A1gina-principal')">ACCESORIOS PARA ENGRASADORES</button>
    <button onclick="window.open('https://sites.google.com/view/meclube-bombas-trasiego-grasa/p%C3%A1gina-principal')">BOMBAS TRASIEGO GRASA</button>
  </div>

  <div class="section-title">
    <h2>DISTRIBUCIÓN DE ACEITE</h2>
  </div>

  <div class="buttons">
    <button onclick="window.open('https://sites.google.com/view/meclube-fnbifubgal34532/p%C3%A1gina-principal')">BOMBAS NEUMÁTICAS INDUSTRIALES PARA ACEITE Y AFINES</button>
    <button onclick="window.open('https://sites.google.com/view/meclube-kit-para-distribucion-/p%C3%A1gina-principal')">KITS PARA DISTRIBUCIÓN ACEITE</button>
    <button onclick="window.open('https://sites.google.com/view/meclube-tinas-de-recoleccion/p%C3%A1gina-principal')">TINAS DE RECOLECCIÓN Y ALMACENAMIENTO</button>
    <button onclick="window.open('https://sites.google.com/view/meclube-instalaciones-y-estruc/p%C3%A1gina-principal')">INSTALACIÓNES Y ESTRUCTURAS FIJAS</button>
  </div>

</div>

<script>
function openLink(url){
  document.getElementById('viewer').innerHTML = `<iframe src="${url}"></iframe>`;
}
</script>

</body>
</html>
